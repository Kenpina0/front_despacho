name: Build & Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: front-despacho
  EKS_CLUSTER_NAME: proyectoeks-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          build-args: |
            VITE_API_VENTAS_URL=${{ secrets.VITE_API_VENTAS_URL }}
            VITE_API_DESPACHOS_URL=${{ secrets.VITE_API_DESPACHOS_URL }}

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configurar kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Aplicar manifiestos Kubernetes
        run: kubectl apply -f k8s/

      - name: Reiniciar Deployment
        run: kubectl rollout restart deployment frontend

      - name: Verificar Pods
        run: kubectl get pods